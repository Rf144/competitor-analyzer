<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>競品情報分析 — 趨勢自動化</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #050a0f;
      --bg-2: #0a1220;
      --bg-3: #0d1a2e;
      --border: rgba(56,189,248,0.1);
      --border-glow: rgba(56,189,248,0.28);
      --cyan: #38bdf8;
      --cyan-dim: rgba(56,189,248,0.7);
      --green: #4ade80;
      --red: #f87171;
      --yellow: #fbbf24;
      --purple: #c084fc;
      --grad: linear-gradient(135deg, #0ea5e9, #6366f1);
      --grad-text: linear-gradient(90deg, #38bdf8, #818cf8);
      --text: #e2e8f0;
      --text-2: #94a3b8;
      --text-3: #334155;
      --card: rgba(10,18,32,0.85);
      --radius: 12px;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    /* grid scanline texture */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(56,189,248,0.02) 1px, transparent 1px),
        linear-gradient(90deg, rgba(56,189,248,0.02) 1px, transparent 1px);
      background-size: 40px 40px;
      pointer-events: none;
      z-index: 0;
    }

    nav {
      padding: 14px 28px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 50;
      background: rgba(5,10,15,0.9);
      backdrop-filter: blur(12px);
    }
    .nav-brand {
      font-weight: 700;
      font-size: 0.95rem;
      background: var(--grad-text);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      letter-spacing: 0.5px;
    }
    .nav-status {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 0.72rem;
      color: var(--cyan-dim);
    }
    .dot-live {
      width: 6px; height: 6px;
      background: var(--green);
      border-radius: 50%;
      animation: blink 2s infinite;
    }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.3} }

    /* ── Hero ── */
    .hero {
      text-align: center;
      padding: 72px 24px 56px;
      position: relative;
      z-index: 1;
    }
    .hero::before {
      content: '';
      position: absolute;
      top: -80px; left: 50%;
      transform: translateX(-50%);
      width: 500px; height: 350px;
      background: radial-gradient(ellipse, rgba(14,165,233,0.12) 0%, transparent 70%);
      pointer-events: none;
    }
    .hero-eyebrow {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      font-size: 0.72rem;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--cyan-dim);
      margin-bottom: 20px;
      border: 1px solid var(--border-glow);
      padding: 5px 16px;
      border-radius: 20px;
    }
    .hero h1 {
      font-size: clamp(1.7rem, 4vw, 2.6rem);
      font-weight: 800;
      line-height: 1.2;
      margin-bottom: 14px;
    }
    .hero h1 em {
      font-style: normal;
      background: var(--grad-text);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .hero p {
      color: var(--text-2);
      font-size: 1rem;
      max-width: 480px;
      margin: 0 auto 36px;
      line-height: 1.7;
    }

    /* ── Input Form ── */
    .form-wrap {
      max-width: 600px;
      margin: 0 auto;
      position: relative;
      z-index: 1;
    }
    .field {
      margin-bottom: 10px;
    }
    .field label {
      display: block;
      font-size: 0.75rem;
      color: var(--text-2);
      margin-bottom: 6px;
      letter-spacing: 0.5px;
    }
    .field input {
      width: 100%;
      background: var(--bg-3);
      border: 1px solid var(--border-glow);
      border-radius: 8px;
      padding: 11px 16px;
      color: var(--text);
      font-size: 0.92rem;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    .field input:focus {
      border-color: var(--cyan);
      box-shadow: 0 0 0 3px rgba(56,189,248,0.1);
    }
    .field input::placeholder { color: var(--text-3); }

    .btn-analyze {
      width: 100%;
      margin-top: 4px;
      background: var(--grad);
      color: #fff;
      border: none;
      border-radius: 8px;
      padding: 13px;
      font-size: 0.95rem;
      font-weight: 700;
      cursor: pointer;
      letter-spacing: 0.5px;
      transition: opacity 0.2s, transform 0.1s;
    }
    .btn-analyze:hover { opacity: 0.9; }
    .btn-analyze:active { transform: scale(0.98); }
    .btn-analyze:disabled { opacity: 0.45; cursor: not-allowed; }

    .examples {
      margin-top: 10px;
      font-size: 0.75rem;
      color: var(--text-3);
      text-align: center;
    }
    .examples a { color: var(--cyan-dim); text-decoration: none; margin: 0 4px; }
    .examples a:hover { color: var(--cyan); }

    /* ── Loading ── */
    #loading {
      display: none;
      max-width: 440px;
      margin: 48px auto 0;
      position: relative;
      z-index: 1;
    }
    .loading-head {
      text-align: center;
      font-size: 0.8rem;
      color: var(--cyan-dim);
      margin-bottom: 16px;
      letter-spacing: 1px;
    }
    .step {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 11px 16px;
      border-radius: 8px;
      margin-bottom: 8px;
      border: 1px solid var(--border);
      background: var(--card);
      transition: all 0.3s;
      font-size: 0.84rem;
      color: var(--text-2);
    }
    .step.active { border-color: rgba(56,189,248,0.35); background: rgba(14,165,233,0.07); color: var(--cyan); }
    .step.done { border-color: rgba(74,222,128,0.25); background: rgba(74,222,128,0.05); color: var(--green); }
    .step-icon { font-size: 1rem; flex-shrink: 0; }
    .step.active .step-icon { animation: spin 2s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Error ── */
    #error-msg {
      display: none;
      max-width: 500px;
      margin: 32px auto 0;
      padding: 14px 18px;
      background: rgba(248,113,113,0.07);
      border: 1px solid rgba(248,113,113,0.25);
      border-radius: 8px;
      font-size: 0.84rem;
      color: var(--red);
      text-align: center;
      position: relative; z-index: 1;
    }

    /* ── Results ── */
    #results {
      display: none;
      max-width: 860px;
      margin: 52px auto 0;
      padding: 0 20px 60px;
      position: relative;
      z-index: 1;
    }

    /* Header card */
    .r-header {
      background: var(--card);
      border: 1px solid var(--border-glow);
      border-radius: var(--radius);
      padding: 28px;
      margin-bottom: 16px;
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 16px;
      backdrop-filter: blur(8px);
    }
    .r-company-name {
      font-size: 1.5rem;
      font-weight: 800;
      margin-bottom: 8px;
    }
    .r-positioning {
      font-size: 0.88rem;
      color: var(--text-2);
      line-height: 1.6;
      max-width: 480px;
    }
    .r-tags { display: flex; gap: 8px; flex-wrap: wrap; }
    .tag {
      font-size: 0.72rem;
      padding: 3px 11px;
      border-radius: 20px;
      font-weight: 600;
      letter-spacing: 0.3px;
    }
    .tag-cyan { background: rgba(56,189,248,0.12); border: 1px solid rgba(56,189,248,0.25); color: var(--cyan); }
    .tag-green { background: rgba(74,222,128,0.1); border: 1px solid rgba(74,222,128,0.25); color: var(--green); }
    .tag-yellow { background: rgba(251,191,36,0.1); border: 1px solid rgba(251,191,36,0.25); color: var(--yellow); }
    .tag-red { background: rgba(248,113,113,0.1); border: 1px solid rgba(248,113,113,0.25); color: var(--red); }
    .tag-purple { background: rgba(192,132,252,0.1); border: 1px solid rgba(192,132,252,0.25); color: var(--purple); }

    /* Takeaway */
    .r-takeaway {
      background: rgba(14,165,233,0.07);
      border: 1px solid rgba(56,189,248,0.2);
      border-left: 3px solid var(--cyan);
      border-radius: 8px;
      padding: 16px 20px;
      margin-bottom: 16px;
      font-size: 0.9rem;
      color: var(--cyan-dim);
      font-style: italic;
      line-height: 1.6;
    }

    /* Grid sections */
    .two-col {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 14px;
      margin-bottom: 14px;
    }
    @media (max-width: 600px) { .two-col { grid-template-columns: 1fr; } }

    .r-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 22px;
      backdrop-filter: blur(8px);
      transition: border-color 0.2s;
    }
    .r-card:hover { border-color: var(--border-glow); }
    .r-card-title {
      font-size: 0.7rem;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      color: var(--text-3);
      margin-bottom: 14px;
      font-weight: 600;
    }
    .r-list { list-style: none; }
    .r-list li {
      display: flex;
      align-items: flex-start;
      gap: 8px;
      padding: 8px 0;
      font-size: 0.84rem;
      color: var(--text-2);
      border-bottom: 1px solid var(--border);
      line-height: 1.5;
    }
    .r-list li:last-child { border-bottom: none; }
    .li-dot { flex-shrink: 0; margin-top: 3px; font-size: 0.6rem; }
    .li-green { color: var(--green); }
    .li-red { color: var(--red); }
    .li-cyan { color: var(--cyan); }
    .li-yellow { color: var(--yellow); }

    /* Differentiation opportunities */
    .opp-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
      gap: 12px;
      margin-bottom: 14px;
    }
    .opp-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 18px;
      backdrop-filter: blur(8px);
      transition: border-color 0.2s, transform 0.2s;
    }
    .opp-card:hover { border-color: rgba(99,102,241,0.4); transform: translateY(-2px); }
    .opp-area {
      font-size: 0.72rem;
      letter-spacing: 1px;
      text-transform: uppercase;
      color: var(--purple);
      margin-bottom: 8px;
      font-weight: 600;
    }
    .opp-insight { font-size: 0.84rem; color: var(--text-2); line-height: 1.6; }

    /* Threat level */
    .threat-wrap {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 22px 26px;
      display: flex;
      align-items: center;
      gap: 20px;
      margin-bottom: 14px;
      backdrop-filter: blur(8px);
    }
    .threat-badge {
      width: 64px; height: 64px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.6rem;
      flex-shrink: 0;
    }
    .threat-low { background: rgba(74,222,128,0.15); border: 2px solid rgba(74,222,128,0.3); }
    .threat-mid { background: rgba(251,191,36,0.15); border: 2px solid rgba(251,191,36,0.3); }
    .threat-high { background: rgba(248,113,113,0.15); border: 2px solid rgba(248,113,113,0.3); }
    .threat-label { font-size: 1rem; font-weight: 700; margin-bottom: 4px; }
    .threat-desc { font-size: 0.82rem; color: var(--text-2); line-height: 1.5; }

    /* CTA */
    .cta-box {
      text-align: center;
      padding: 44px 24px;
      background: var(--card);
      border: 1px solid var(--border-glow);
      border-radius: var(--radius);
      backdrop-filter: blur(8px);
    }
    .cta-box h3 { font-size: 1.2rem; font-weight: 700; margin-bottom: 10px; }
    .cta-box p { font-size: 0.86rem; color: var(--text-2); margin-bottom: 22px; }
    .btn-cta {
      display: inline-block;
      background: var(--grad);
      color: #fff;
      padding: 12px 32px;
      border-radius: 8px;
      font-size: 0.92rem;
      font-weight: 700;
      text-decoration: none;
      transition: opacity 0.2s;
    }
    .btn-cta:hover { opacity: 0.88; }

    footer {
      text-align: center;
      padding: 20px;
      font-size: 0.72rem;
      color: var(--text-3);
      border-top: 1px solid var(--border);
      position: relative; z-index: 1;
    }
    footer a { color: var(--cyan-dim); text-decoration: none; }
  </style>
</head>
<body>

<nav>
  <span class="nav-brand">競品情報分析 · INTEL</span>
  <span class="nav-status"><span class="dot-live"></span> AI 引擎運行中</span>
</nav>

<section class="hero">
  <div class="hero-eyebrow">⚡ AI-Powered Competitive Intelligence</div>
  <h1>貼上對手官網，<em>秒看破綻</em></h1>
  <p>AI 自動爬取競爭對手官網，分析定位、優劣勢、行銷策略，找出你能攻進去的差異化機會。</p>

  <div class="form-wrap">
    <div class="field">
      <label>競品官網網址 *</label>
      <input type="url" id="url-input" placeholder="https://competitor.com" autocomplete="off" />
    </div>
    <div class="field">
      <label>你的業務簡述（選填，讓分析更精準）</label>
      <input type="text" id="my-biz-input" placeholder="例如：我們是提供中小企業 AI 自動化服務的顧問公司" />
    </div>
    <button class="btn-analyze" id="btn-analyze" onclick="runAnalysis()">🔍 開始情報分析</button>
    <p class="examples">
      試試看：
      <a href="#" onclick="fillExample('https://www.liontravel.com', ''); return false;">雄獅旅遊</a>
      <a href="#" onclick="fillExample('https://www.104.com.tw', ''); return false;">104人力銀行</a>
      <a href="#" onclick="fillExample('https://www.wowprime.com', ''); return false;">王品集團</a>
    </p>
  </div>
</section>

<div id="loading">
  <p class="loading-head">▶ 情報蒐集中…</p>
  <div class="step" id="step-1"><span class="step-icon">🌐</span> 爬取競品官網（Apify）</div>
  <div class="step" id="step-2"><span class="step-icon">🧠</span> AI 分析市場定位與策略</div>
  <div class="step" id="step-3"><span class="step-icon">📋</span> 生成競品情報報告</div>
</div>

<div id="error-msg"></div>
<div id="results"></div>

<footer>
  <a href="https://vantage-automation.com" target="_blank">趨勢自動化</a> — 讓 AI 真正為您的企業工作
</footer>

<script>
  const WEBHOOK = 'https://xlab-haha.zeabur.app/webhook/vantage-competitor';

  function fillExample(url, biz) {
    document.getElementById('url-input').value = url;
    document.getElementById('my-biz-input').value = biz;
    document.getElementById('url-input').focus();
  }

  function setStep(n, state) {
    for (let i = 1; i <= 3; i++) {
      const el = document.getElementById('step-' + i);
      el.className = 'step';
      const icon = el.querySelector('.step-icon');
      if (i < n) { el.classList.add('done'); icon.textContent = '✓'; }
      if (i === n && state === 'active') el.classList.add('active');
    }
  }

  const threatConfig = {
    '高': { cls: 'threat-high', icon: '🔴', label: '高威脅競品', desc: '對方在多個關鍵維度具備顯著優勢，需要明確的差異化策略應對。' },
    '中': { cls: 'threat-mid', icon: '🟡', label: '中等威脅', desc: '對方有一定實力，但也存在明顯弱點，可從特定切入點突破。' },
    '低': { cls: 'threat-low', icon: '🟢', label: '低威脅競品', desc: '對方優勢有限，市場空間相對充裕，可積極搶占其弱點區域。' },
  };

  function renderResults(data) {
    const r = data.report;

    const priceTag = { '高端': 'tag-purple', '中端': 'tag-cyan', '平價': 'tag-green' };
    const threatCfg = threatConfig[r.threat_level] || threatConfig['中'];

    const swotHtml = `
      <div class="two-col">
        <div class="r-card">
          <p class="r-card-title">競品優勢</p>
          <ul class="r-list">
            ${(r.strengths || []).map(s => `<li><span class="li-dot li-red">●</span>${s}</li>`).join('')}
          </ul>
        </div>
        <div class="r-card">
          <p class="r-card-title">競品弱點 / 缺口</p>
          <ul class="r-list">
            ${(r.weaknesses || []).map(s => `<li><span class="li-dot li-green">●</span>${s}</li>`).join('')}
          </ul>
        </div>
      </div>`;

    const stratHtml = `
      <div class="two-col">
        <div class="r-card">
          <p class="r-card-title">主要產品 / 服務</p>
          <ul class="r-list">
            ${(r.main_products || []).map(s => `<li><span class="li-dot li-cyan">●</span>${s}</li>`).join('')}
          </ul>
        </div>
        <div class="r-card">
          <p class="r-card-title">行銷管道 & 品牌語氣</p>
          <ul class="r-list">
            ${(r.marketing_channels || []).map(s => `<li><span class="li-dot li-yellow">●</span>${s}</li>`).join('')}
            ${r.messaging_tone ? `<li><span class="li-dot li-yellow">●</span>語氣：${r.messaging_tone}</li>` : ''}
          </ul>
        </div>
      </div>`;

    const oppHtml = (r.differentiation_opportunities || []).map(o => `
      <div class="opp-card">
        <p class="opp-area">${o.area || ''}</p>
        <p class="opp-insight">${o.insight || ''}</p>
      </div>`).join('');

    document.getElementById('results').innerHTML = `
      <div class="r-header">
        <div>
          <div class="r-company-name">${r.company_name || '目標競品'}</div>
          <div class="r-positioning">${r.positioning || ''}</div>
          <div style="margin-top:10px;font-size:0.8rem;color:var(--text-3)">目標客群：${r.target_audience || '-'}</div>
        </div>
        <div class="r-tags">
          <span class="tag tag-cyan">${r.industry || '-'}</span>
          <span class="tag ${priceTag[r.price_positioning] || 'tag-yellow'}">${r.price_positioning || '未知'}</span>
        </div>
      </div>

      <div class="r-takeaway">💡 ${r.key_takeaway || ''}</div>

      ${swotHtml}
      ${stratHtml}

      <p style="font-size:0.7rem;letter-spacing:1.5px;text-transform:uppercase;color:var(--text-3);margin-bottom:12px;font-weight:600;">差異化機會</p>
      <div class="opp-grid">${oppHtml}</div>

      <div class="threat-wrap">
        <div class="threat-badge ${threatCfg.cls}">${threatCfg.icon}</div>
        <div>
          <div class="threat-label">${threatCfg.label}</div>
          <div class="threat-desc">${threatCfg.desc}</div>
        </div>
      </div>

      <div class="cta-box">
        <h3>想把競品分析自動化到你的業務流程？</h3>
        <p>趨勢自動化可以幫你建立定期監控競品的自動化系統，隨時掌握市場動態</p>
        <a class="btn-cta" href="https://vantage-automation.com/#contact" target="_blank">免費諮詢</a>
      </div>
    `;

    document.getElementById('results').style.display = 'block';
    window.scrollTo({ top: 0, behavior: 'smooth' });
  }

  async function runAnalysis() {
    const urlVal = document.getElementById('url-input').value.trim();
    if (!urlVal) { document.getElementById('url-input').focus(); return; }
    if (!urlVal.startsWith('http')) { showError('請輸入完整網址（含 https://）'); return; }

    const myBiz = document.getElementById('my-biz-input').value.trim();
    const btn = document.getElementById('btn-analyze');
    btn.disabled = true;
    btn.textContent = '分析中…';
    document.getElementById('loading').style.display = 'block';
    document.getElementById('results').style.display = 'none';
    document.getElementById('error-msg').style.display = 'none';
    window.scrollTo({ top: 280, behavior: 'smooth' });

    setStep(1, 'active');
    const t1 = setTimeout(() => setStep(2, 'active'), 15000);
    const t2 = setTimeout(() => setStep(3, 'active'), 40000);

    try {
      const res = await fetch(WEBHOOK, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ url: urlVal, my_business: myBiz })
      });

      clearTimeout(t1); clearTimeout(t2);
      setStep(3, 'active');

      if (!res.ok) throw new Error('伺服器錯誤：' + res.status);
      const data = await res.json();
      if (!data.success) throw new Error(data.message || '分析失敗');

      document.getElementById('loading').style.display = 'none';
      renderResults(data);
    } catch(e) {
      clearTimeout(t1); clearTimeout(t2);
      document.getElementById('loading').style.display = 'none';
      showError('分析失敗：' + e.message);
    }

    btn.disabled = false;
    btn.textContent = '🔍 開始情報分析';
  }

  function showError(msg) {
    const el = document.getElementById('error-msg');
    el.textContent = msg;
    el.style.display = 'block';
  }

  document.getElementById('url-input').addEventListener('keydown', e => {
    if (e.key === 'Enter') runAnalysis();
  });
</script>
</body>
</html>
